spring.application.name=arare

spring.datasource.url=${ARARE_DB_URL:jdbc:postgresql://localhost:5432/araredb}
spring.datasource.username=${ARARE_DB_USERNAME:postgres}
spring.datasource.password=${ARARE_DB_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

timefold.solver.termination.spent-limit=30s
# Score direction: MINIMIZE is default for penalty-based scoring
# timefold.solver.environment-mode=REPRODUCIBLE

logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.tool.schema=INFO
