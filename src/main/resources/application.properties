# =============================================
# ARARE – Application Configuration
# =============================================

spring.application.name=arare

# ---- Database (PostgreSQL) ----
spring.datasource.url=jdbc:postgresql://localhost:5432/arare_db
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ---- Timefold Solver ----
# Time limit per solve request (ISO-8601 duration)
timefold.solver.termination.spent-limit=30s
# Score direction: MINIMIZE is default for penalty-based scoring
# timefold.solver.environment-mode=REPRODUCIBLE

# ---- Logging (DDL diagnostic) ----
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.tool.schema=DEBUG
